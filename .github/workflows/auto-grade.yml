name: Auto-Grade Student Submissions

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  detect-assignment:
    runs-on: ubuntu-latest
    outputs:
      week: ${{ steps.detect.outputs.week }}
      assignment: ${{ steps.detect.outputs.assignment }}
    steps:
      - name: Detect Assignment Week
        id: detect
        run: |
          BRANCH_NAME="${{ github.head_ref }}"

          echo "🔍 Detecting assignment from branch: $BRANCH_NAME"

          # Extract week number from branch name (e.g., assignment/week-02 or assignments/week-2)
          if [[ "$BRANCH_NAME" =~ assignments?/week-0?([0-9]+) ]]; then
            WEEK="${BASH_REMATCH[1]}"
            echo "✅ Detected week: $WEEK"
          else
            echo "::error::Could not detect week number from branch name"
            echo "::error::Expected format: assignment/week-XX or assignments/week-XX"
            echo "::error::Branch: $BRANCH_NAME"
            exit 1
          fi

          # Pad week number to 2 digits
          WEEK=$(printf "%02d" $WEEK)

          # Map week to assignment folder
          case $WEEK in
            01) ASSIGNMENT="week-01-hello-github" ;;
            02) ASSIGNMENT="week-02-calculator-lite" ;;
            03) ASSIGNMENT="week-03-profile-card" ;;
            05) ASSIGNMENT="week-05-guess-the-number" ;;
            06) ASSIGNMENT="week-06-text-menu-app" ;;
            07) ASSIGNMENT="week-07-class-roster" ;;
            08) ASSIGNMENT="week-08-mad-libs" ;;
            09) ASSIGNMENT="week-09-methods-linq" ;;
            10) ASSIGNMENT="week-10-file-io" ;;
            *)
              echo "::error::Week $WEEK not yet configured in workflow"
              echo "::error::Available weeks: 01, 02, 03, 05, 06, 07, 08, 09, 10"
              exit 1
              ;;
          esac

          echo "week=$WEEK" >> $GITHUB_OUTPUT
          echo "assignment=$ASSIGNMENT" >> $GITHUB_OUTPUT
          echo "✅ Detected: Week $WEEK - $ASSIGNMENT"

  test-assignment:
    needs: detect-assignment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Request Instructor Review
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                reviewers: ['ZakBrinlee']
              });
              console.log('✅ Review requested from ZakBrinlee');
            } catch (error) {
              console.log('⚠️ Could not request review:', error.message);
              // Don't fail the workflow if review request fails
            }

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Display Assignment Info
        run: |
          echo "📚 Testing Week ${{ needs.detect-assignment.outputs.week }}"
          echo "📝 Assignment: ${{ needs.detect-assignment.outputs.assignment }}"

      - name: Restore dependencies
        run: |
          cd modules/${{ needs.detect-assignment.outputs.assignment }}/tests
          dotnet restore

      - name: Build starter project
        run: |
          cd modules/${{ needs.detect-assignment.outputs.assignment }}/starter
          dotnet build --no-restore

      - name: Build test project
        run: |
          cd modules/${{ needs.detect-assignment.outputs.assignment }}/tests
          dotnet build --no-restore

      - name: Run tests
        id: test
        run: |
          cd modules/${{ needs.detect-assignment.outputs.assignment }}

          # Make test script executable
          chmod +x ../../run-tests.sh

          # Run tests using the clean test runner script
          ../../run-tests.sh tests --no-build > test-output.txt 2>&1 || true

          # Display output in workflow logs
          echo "📊 Test Output:"
          cat test-output.txt

          # Check if tests passed
          if grep -q "All Tests Passed" test-output.txt; then
            echo "status=passed" >> $GITHUB_OUTPUT
            echo "✅ All tests passed!"
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "❌ Some tests failed"
          fi

      - name: Parse test results
        id: results
        run: |
          cd modules/${{ needs.detect-assignment.outputs.assignment }}

          # Just check if tests passed overall
          if grep -q "All Tests Passed" test-output.txt; then
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
          fi

      - name: Comment PR with results
        uses: actions/github-script@v7
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const testOutputPath = 'modules/${{ needs.detect-assignment.outputs.assignment }}/test-output.txt';
            let testOutput = '';

            try {
              testOutput = fs.readFileSync(testOutputPath, 'utf8');
              // Strip ANSI color codes for clean display in GitHub comments
              testOutput = testOutput.replace(/\x1b\[[0-9;]*m/g, '');
            } catch (error) {
              testOutput = 'Could not read test output';
            }

            const status = '${{ steps.test.outputs.status }}';

            // Extract failed test details from clean output format
            // Format: "❌ TEST XX: Description"
            const failedTests = [];
            const passedTests = [];
            const lines = testOutput.split('\n');
            for (let i = 0; i < lines.length; i++) {
              if (lines[i].includes('❌ TEST')) {
                const testLine = lines[i].trim();
                const cleanLine = testLine.replace(/\x1b\[[0-9;]*m/g, '');
                failedTests.push(cleanLine);
              } else if (lines[i].includes('✅ TEST')) {
                const testLine = lines[i].trim();
                const cleanLine = testLine.replace(/\x1b\[[0-9;]*m/g, '');
                passedTests.push(cleanLine);
              }
            }

            const emoji = status === 'passed' ? '✅' : '❌';

            let comment = `## ${emoji} Test Results - Week ${{ needs.detect-assignment.outputs.week }}\n\n`;
            comment += `**Assignment:** \`${{ needs.detect-assignment.outputs.assignment }}\`\n\n`;

            if (status === 'passed') {
              comment += `### 🎉 Excellent work! All tests passed!\n\n`;
              comment += `Your assignment meets all requirements and is ready for review.\n\n`;

              // Show all passing tests
              if (passedTests.length > 0) {
                comment += `### ✅ Tests that pass:\n\n`;
                passedTests.forEach(test => {
                  comment += `- ${test}\n`;
                });
                comment += `\n`;
              }

              comment += `#### Next Steps:\n`;
              comment += `- Wait for instructor feedback\n`;
              comment += `- Once approved, your PR will be merged\n`;
            } else {
              // Show failed tests first
              comment += `### 📝 Tests that need attention:\n\n`;
              if (failedTests.length > 0) {
                const uniqueTests = [...new Set(failedTests)];
                uniqueTests.forEach(test => {
                  comment += `- ${test}\n`;
                });
              } else {
                comment += `See detailed test output below for more information.\n`;
              }

              // Show passed tests next
              if (passedTests.length > 0) {
                comment += `\n### ✅ Tests that pass:\n\n`;
                passedTests.forEach(test => {
                  comment += `- ${test}\n`;
                });
              }

              comment += `\n### 💡 Next Steps:\n\n`;
              comment += `1. Review the failed tests above\n`;
              comment += `2. Run tests locally to debug:\n`;
              comment += `   \`\`\`bash\n`;
              comment += `   # From the repository root:\n`;
              comment += `   ./test ${{ needs.detect-assignment.outputs.week }}\n`;
              comment += `   \`\`\`\n`;
              comment += `3. Make necessary corrections to your code\n`;
              comment += `4. Commit and push your changes\n`;
              comment += `5. Tests will automatically re-run\n`;
            }

            comment += `\n---\n\n`;

            // Only show detailed output if there are failures
            if (status !== 'passed') {
              comment += `<details>\n<summary>📋 Full Test Output (click to expand)</summary>\n\n`;
              comment += `\`\`\`\n${testOutput.substring(0, 50000)}\n\`\`\`\n\n`;
              comment += `</details>\n\n`;
              comment += `---\n`;
            }

            const now = new Date();
            const pstString = now.toLocaleString('en-US', {
              timeZone: 'America/Los_Angeles',
              year: 'numeric',
              month: '2-digit',
              day: '2-digit',
              hour: '2-digit',
              minute: '2-digit',
              second: '2-digit',
              hour12: false
            });
            // Convert from "01/02/2026, 15:30:45" to "01-02-2026 15:30:45"
            const timestamp = pstString.replace(/(\d{2})\/(\d{2})\/(\d{4}), (\d{2}:\d{2}:\d{2})/, '$1-$2-$3 $4');
            comment += `*Automated grading system • [Learn more](../../docs/GRADING_SYSTEM.md)*\n\n`;
            comment += `*Last updated: ${timestamp} PST*`;

            // Find existing bot comments
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Test Results - Week')
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment
              });
              console.log('Updated existing comment');
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
              console.log('Created new comment');
            }

      - name: Set check status
        if: always()
        run: |
          if [ "${{ steps.test.outputs.status }}" == "passed" ]; then
            echo "✅ All tests passed"
            exit 0
          else
            echo "❌ Some tests failed - merge blocked"
            echo "Instructor can override by commenting '/override-tests' on the PR"
            exit 1
          fi
